services:
  # ── Matrix Synapse Homeserver ──────────────────────────────────────────────
  - type: web
    name: synapse
    runtime: docker
    dockerfilePath: ./synapse/Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /_matrix/client/versions
    disk:
      name: synapse-data
      mountPath: /data
      sizeGB: 10
    envVars:
      - key: SYNAPSE_SERVER_NAME
        sync: false          # Set this to your Render service URL e.g. synapse.onrender.com
      - key: SYNAPSE_PUBLIC_BASEURL
        sync: false          # https://synapse.onrender.com
      - key: POSTGRES_USER
        fromDatabase:
          name: synapse-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: synapse-db
          property: password
      - key: POSTGRES_DB
        fromDatabase:
          name: synapse-db
          property: database
      - key: POSTGRES_HOST
        fromDatabase:
          name: synapse-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: synapse-db
          property: port
      - key: SYNAPSE_REGISTRATION_SHARED_SECRET
        generateValue: true
      - key: SYNAPSE_MACAROON_SECRET_KEY
        generateValue: true
      - key: SYNAPSE_FORM_SECRET
        generateValue: true
      # Optional — fill in for email verification
      - key: SMTP_HOST
        value: ""
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: ""
      - key: SMTP_PASSWORD
        value: ""
      - key: SMTP_FROM
        value: ""

  # ── React Frontend ─────────────────────────────────────────────────────────
  - type: web
    name: messenger-frontend
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_MATRIX_HOMESERVER
        sync: false          # https://synapse.onrender.com  (set AFTER Synapse is deployed)

databases:
  - name: synapse-db
    databaseName: synapse
    user: synapse
    plan: starter
