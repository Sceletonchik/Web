services:
  # ── Node.js Backend ────────────────────────────────────────────────────────
  - type: web
    name: messenger-backend
    runtime: node
    plan: free
    buildCommand: cd backend && npm ci
    startCommand: cd backend && node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: messenger-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_ORIGIN
        sync: false   # Set to your frontend URL after deploy, e.g. https://messenger-frontend.onrender.com

  # ── React Frontend (Static) ────────────────────────────────────────────────
  - type: web
    name: messenger-frontend
    runtime: static
    plan: free
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false   # Set to your backend URL, e.g. https://messenger-backend.onrender.com

databases:
  - name: messenger-db
    databaseName: messenger
    user: messenger
    plan: free
